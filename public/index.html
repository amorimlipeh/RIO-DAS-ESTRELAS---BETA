<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeto Rio das Estrelas</title>

<style>

body{
background:#07132b;
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:#0f1c3a;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h1{
font-size:26px;
margin-bottom:5px;
}

h2{
font-size:16px;
font-weight:normal;
margin-bottom:20px;
color:#ccc;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2ecc71;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.info{
margin-top:10px;
font-size:13px;
color:#bbb;
}

.status{
margin-top:8px;
font-size:13px;
color:#9be7ff;
}

</style>

</head>

<body>

<div class="container">

<h1>Projeto Rio das Estrelas</h1>
<h2>WMS + Estoque • V11 Final</h2>

<input id="usuario" placeholder="Usuário">

<input id="senha" type="password" placeholder="Senha">

<button id="btnLogin">Acessar conta</button>

<div class="info">
Usuário teste: admin / admin123
</div>

<div class="status" id="status">
Verificando servidor...
</div>

</div>

<script>

async function verificarServidor(){

try{

const r = await fetch("/api/ping")

if(r.ok){
document.getElementById("status").innerText =
"Servidor online. Faça login."
}

}catch{

document.getElementById("status").innerText =
"Servidor offline."

}

}

verificarServidor()

async function fazerLogin(){

const usuario = document.getElementById("usuario").value
const senha = document.getElementById("senha").value

if(!usuario || !senha){
alert("Preencha usuário e senha")
return
}

try{

const resposta = await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usuario:usuario,
senha:senha
})
})

const dados = await resposta.json()

if(dados.ok){

alert("Login realizado com sucesso")

window.location.href="/app"

}else{

alert("Usuário ou senha inválidos")

}

}catch(e){

console.log(e)

alert("Erro ao conectar com servidor")

}

}

document.getElementById("btnLogin")
.addEventListener("click",fazerLogin)

</script>

</body>
</html>
